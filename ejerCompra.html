<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Selecciona productos para tu factura</h2>
    <form id="facturaForm">
        <label for="productos">Productos:</label>
        <div id="productos">
            <input type="checkbox" value="patatas" id="patatas"> <label for="patatas">Patatas</label><br>
            <input type="checkbox" value="carne" id="carne"> <label for="carne">Carne</label><br>
            <input type="checkbox" value="pescado" id="pescado"> <label for="pescado">Pescado</label><br>
            <input type="checkbox" value="pan" id="pan"> <label for="pan">Pan</label><br>
        </div>
        <label for="cantidad">Cantidad:</label>
        <input type="number" id="cantidad" min="1" value="1">
        <button type="button" onclick="generaFactura()">Generar Factura</button>
    </form>
    <div id="factura"></div>

    <script>
        var Listacompra = [
            {"producto": "patatas", "cantidad": 3, "precio": 20},
            {"producto": "carne", "cantidad": 10, "precio": 60},
            {"producto": "pescado", "cantidad": 8, "precio": 40},
            {"producto": "pan", "cantidad": 3, "precio": 5}
        ];

        function generaFactura() {
            let cantidadIngresada = parseInt(document.getElementById("cantidad").value);
            let productosSeleccionados = document.querySelectorAll('#productos input[type="checkbox"]:checked');
            let facturaHTML = '<h3>Factura</h3>';
            let totalGeneral = 0;

            facturaHTML += `
                <table border="1">
                    <tr>
                        <th>Producto</th>
                        <th>Precio Unitario (€)</th>
                        <th>Cantidad</th>
                        <th>Total (€)</th>
                    </tr>
            `;

            productosSeleccionados.forEach((checkbox) => {
                let producto = Listacompra.find(item => item.producto === checkbox.value);
                if (producto) {
                    let total = cantidadIngresada * producto.precio;
                    totalGeneral += total;
                    facturaHTML += `
                        <tr>
                            <td>${producto.producto}</td>
                            <td>${producto.precio}</td>
                            <td>${cantidadIngresada}</td>
                            <td>${total}</td>
                        </tr>
                    `;
                }
            });

            facturaHTML += `
                <tr>
                    <td colspan="3"><strong>Total General</strong></td>
                    <td><strong>${totalGeneral} €</strong></td>
                </tr>
                </table>
            `;

            document.getElementById("factura").innerHTML = facturaHTML;
        }
    </script>
</body>
</html>
